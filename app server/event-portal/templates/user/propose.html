{% extends "base.html" %}
{% block title %}Propose an event &middot; {{ site_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h1 class="h3 mb-1">Propose a new event</h1>
    <p class="text-muted">Submit your idea — an admin will review it before it goes live.</p>

    <div class="card">
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Event name</label>
              <input type="text" name="name" required minlength="3" class="form-control" value="{{ form.name }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">Category</label>
              <select name="category" required class="form-select">
                <option value="">Select...</option>
                {% for c in categories %}
                  <option value="{{ c }}" {% if form.category == c %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Date</label>
              <input type="date" name="date" required min="{{ today }}" class="form-control" value="{{ form.date }}">
            </div>
            <div class="col-md-5">
              <label class="form-label">Venue</label>
              <input type="text" name="venue" required class="form-control" value="{{ form.venue }}">
            </div>
            <div class="col-md-3">
              <label class="form-label">Budget (₹)</label>
              <input type="number" min="0" step="0.01" name="budget" class="form-control" value="{{ form.budget }}">
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea name="description" rows="4" class="form-control">{{ form.description }}</textarea>
            </div>
            <div class="col-12">
              <label class="form-label">Event Poster</label>
              <input type="file" name="poster" class="form-control" accept="image/*">
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="is_competition" id="isComp" {% if form.is_competition %}checked{% endif %}>
                <label class="form-check-label" for="isComp">This is a competition (winners + ranks)</label>
              </div>
            </div>
          </div>
          <div class="d-flex justify-content-between mt-4">
            <a href="{{ url_for('user.portal') }}" class="btn btn-link">Cancel</a>
            <button class="btn btn-primary"><i class="bi bi-send"></i> Submit for approval</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
