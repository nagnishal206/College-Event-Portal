{% extends "base.html" %}
{% block title %}Sign in &middot; {{ site_name }}{% endblock %}



{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card card-stat p-4 p-md-5">
      <span class="step-pill text-brand fw-semibold">Sign in</span>
      <h1 class="h3 fw-bold mt-2 mb-1">Welcome back</h1>
      <p class="text-muted small mb-4">
        Use your campus email and password. Admins and students sign in here.
      </p>

      <form method="post" action="{{ url_for('auth.login') }}" novalidate>
        <div class="mb-3">
          <label class="form-label">Campus Email</label>
          <input
            type="email"
            name="email"
            value="{{ email }}"
            required
            autofocus
            class="form-control"
            placeholder="you@college.edu"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password"
            required
            class="form-control"
            placeholder="••••••••"
          />
          <div class="text-end mt-1">
            <a href="{{ url_for('auth.forgot_password') }}" class="small text-decoration-none text-brand">Forgot Password?</a>
          </div>
        </div>
        <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold">
          Sign in
        </button>
      </form>

      <hr class="my-4" />
      <div class="text-center small text-muted">
        New here?
        <a href="{{ url_for('auth.register') }}" class="text-brand fw-semibold">
          Create an account
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
