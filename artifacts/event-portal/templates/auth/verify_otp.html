{% extends "base.html" %}
{% block title %}Verify your email &middot; {{ site_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card card-stat p-4 p-md-5 text-center">
      <i class="bi bi-shield-lock-fill text-brand" style="font-size: 2.4rem;"></i>
      <h1 class="h4 fw-bold mt-2 mb-1">Check your inbox</h1>
      <p class="text-muted small mb-4">
        We sent a 6-digit code to
        <strong>{{ email }}</strong>. It expires in 10 minutes.
      </p>

      <form method="post" action="{{ url_for('auth.verify_otp') }}" novalidate>
        <input type="hidden" name="email" value="{{ email }}" />
        <input
          name="otp"
          inputmode="numeric"
          pattern="[0-9]{6}"
          maxlength="6"
          required
          autofocus
          class="form-control form-control-lg text-center fw-bold"
          style="letter-spacing: .6em; font-size: 1.6rem;"
          placeholder="••••••"
        />
        <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold mt-3">
          Verify &amp; activate account
        </button>
      </form>

      <form
        method="post"
        action="{{ url_for('auth.resend_otp') }}"
        class="mt-3"
      >
        <input type="hidden" name="email" value="{{ email }}" />
        <button class="btn btn-link text-decoration-none small" type="submit">
          Resend code
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
